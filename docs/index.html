<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Funding Opportunities Dashboard</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --border: #232a31;
    --text: #e6e8eb;
    --muted: #8a939c;
    --accent: #4f9cf9;
    --chip-bg: #1c2228;
    --row-hover: #181d23;
    --open: #2ea043;
    --closed: #6e7681;
    --warn: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  header {
    padding: 24px 32px 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 13px; }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    align-items: center;
  }
  .toolbar input[type=search] {
    flex: 1;
    min-width: 220px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
  }
  .toolbar input[type=search]:focus { outline: 1px solid var(--accent); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: var(--chip-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 12px;
    user-select: none;
    transition: all 0.15s;
  }
  .chip:hover { color: var(--text); }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted::after { content: " ↓"; color: var(--accent); }
  thead th.sorted.asc::after { content: " ↑"; }
  tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tbody tr:hover { background: var(--row-hover); }
  td.title a {
    color: var(--text);
    font-weight: 500;
    text-decoration: none;
  }
  td.title a:hover { color: var(--accent); }
  td.title .funder {
    display: block;
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }
  td.tracker { white-space: nowrap; }
  .src-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .src-global-dev { background: #1f3a4d; color: #79c0ff; }
  .src-ai-work    { background: #3d2e4d; color: #d2a8ff; }
  .src-ai-agents  { background: #1f4d3a; color: #7ee2a8; }
  .src-ai-eval    { background: #4d3a1f; color: #ffd57e; }
  td.deadline { white-space: nowrap; color: var(--muted); }
  td.deadline.soon { color: var(--warn); font-weight: 600; }
  td.deadline.rolling { color: var(--accent); font-style: italic; }
  td.amount { white-space: nowrap; color: var(--muted); }
  .empty {
    padding: 64px;
    text-align: center;
    color: var(--muted);
  }
  footer {
    padding: 24px 32px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Funding Opportunities Dashboard</h1>
  <div class="meta" id="meta">Loading…</div>
</header>
<div class="toolbar">
  <input type="search" id="q" placeholder="Search title, funder, description…" />
  <div class="chips" id="trackerChips"></div>
</div>
<table>
  <thead>
    <tr>
      <th data-sort="title">Title</th>
      <th data-sort="source_tracker">Tracker</th>
      <th data-sort="deadline" class="sorted">Deadline</th>
      <th data-sort="amount_raw">Amount</th>
      <th data-sort="thematic_fit">Fit</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
<div class="empty" id="empty" style="display:none">No opportunities match your filters.</div>
<footer>
  Generated by the funding aggregator. Data files: <a href="../central/funding.csv">funding.csv</a> ·
  <a href="data.json">data.json</a> · <code>central/funding.sqlite</code>
</footer>

<script>
let DATA = [];
const STATE = { q: "", trackers: new Set(), sort: "deadline", asc: true };
const TRACKERS = ["global-dev", "ai-work", "ai-agents", "ai-eval"];

function fmtDeadline(row) {
  if (row.rolling) return { text: "rolling", cls: "rolling" };
  if (!row.deadline) return { text: "—", cls: "" };
  const d = new Date(row.deadline);
  const days = Math.ceil((d - Date.now()) / 86400000);
  let cls = "";
  if (days >= 0 && days <= 21) cls = "soon";
  return {
    text: d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }) +
          (days >= 0 ? ` (${days}d)` : ""),
    cls,
  };
}

function render() {
  const q = STATE.q.toLowerCase();
  const trackerFilter = STATE.trackers;
  let rows = DATA.filter(r => {
    if (trackerFilter.size && !trackerFilter.has(r.source_tracker)) return false;
    if (!q) return true;
    return [r.title, r.funder, r.description, r.category]
      .filter(Boolean).some(s => s.toLowerCase().includes(q));
  });
  rows.sort((a, b) => {
    const av = a[STATE.sort], bv = b[STATE.sort];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (av < bv) return STATE.asc ? -1 : 1;
    if (av > bv) return STATE.asc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";
  for (const r of rows) {
    const tr = document.createElement("tr");
    const dl = fmtDeadline(r);
    tr.innerHTML = `
      <td class="title">
        <a href="${r.url || "#"}" target="_blank" rel="noopener">${escapeHtml(r.title)}</a>
        ${r.funder ? `<span class="funder">${escapeHtml(r.funder)}</span>` : ""}
      </td>
      <td class="tracker"><span class="src-tag src-${r.source_tracker}">${r.source_tracker}</span></td>
      <td class="deadline ${dl.cls}">${dl.text}</td>
      <td class="amount">${escapeHtml(r.amount_raw || "—")}</td>
      <td>${r.thematic_fit ? "★".repeat(r.thematic_fit) : "—"}</td>
    `;
    tbody.appendChild(tr);
  }
  document.getElementById("empty").style.display = rows.length ? "none" : "block";
  document.getElementById("meta").textContent =
    `${rows.length} of ${DATA.length} opportunities · ${[...new Set(DATA.map(r => r.source_tracker))].length} trackers`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function buildChips() {
  const wrap = document.getElementById("trackerChips");
  for (const t of TRACKERS) {
    const el = document.createElement("div");
    el.className = "chip";
    el.textContent = t;
    el.onclick = () => {
      if (STATE.trackers.has(t)) STATE.trackers.delete(t);
      else STATE.trackers.add(t);
      el.classList.toggle("active");
      render();
    };
    wrap.appendChild(el);
  }
}

document.querySelectorAll("th[data-sort]").forEach(th => {
  th.onclick = () => {
    const key = th.dataset.sort;
    if (STATE.sort === key) STATE.asc = !STATE.asc;
    else { STATE.sort = key; STATE.asc = true; }
    document.querySelectorAll("th[data-sort]").forEach(t => t.classList.remove("sorted", "asc"));
    th.classList.add("sorted");
    if (STATE.asc) th.classList.add("asc");
    render();
  };
});
document.getElementById("q").oninput = e => { STATE.q = e.target.value; render(); };

buildChips();
fetch("data.json")
  .then(r => r.json())
  .then(d => { DATA = d; render(); })
  .catch(e => {
    document.getElementById("meta").textContent = "Failed to load data.json: " + e.message;
  });
</script>
</body>
</html>
